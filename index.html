<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CRITERIA Consultoría Empresarial — Gestión de talento y relaciones laborales para pymes. Próximamente.">
  <title>CRITERIA | Consultoría Empresarial</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #082f56;
      --blue:    #30598c;
      --teal-dk: #135677;
      --teal:    #4097a3;
      --bg:      #f8f9fb;
      --text:    #1e2a35;
      --muted:   #6b7a8d;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* ── Layout ── */
    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    /* ── Logo ── */
    .logo {
      display: block;
      margin: 0 auto 2.5rem;
      width: 260px;
      max-width: 80vw;
      height: auto;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--teal), var(--teal-dk));
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    /* ── Heading ── */
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--navy);
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
    }

    /* ── Body text ── */
    .message {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.8;
      font-weight: 400;
      max-width: 400px;
      margin: 0 auto 2.25rem;
    }
    .message strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── CTA Button ── */
    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dk));
      color: #fff;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .btn-wa:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
    .btn-wa svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Footer note ── */
    .note {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #aab4be;
      letter-spacing: 0.02em;
    }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .logo { width: 200px; }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Logo -->
    <img src="assets/logo/logo.svg" alt="CRITERIA Consultoría Empresarial" class="logo">

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Heading -->
    <h1>Estamos preparando<br>algo nuevo para ti</h1>

    <!-- Message -->
    <p class="message">
      Estamos construyendo nuestra nueva experiencia digital.<br>
      Muy pronto podrás conocer más sobre nuestros servicios en
      <strong>gestión de talento y relaciones laborales</strong>.
    </p>

    <!-- CTA -->
    <!-- TODO: reemplazar # por el enlace real de WhatsApp -->
    <a href="#" class="btn-wa" aria-label="Contactar por WhatsApp">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 2C6.477 2 2 6.477 2 12c0 1.79.467 3.47 1.284 4.934L2 22l5.233-1.259A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 01-4.077-1.114l-.292-.173-3.026.729.759-2.948-.19-.303A7.96 7.96 0 014 12c0-4.418 3.582-8 8-8s8 3.582 8 8-3.582 8-8 8z"/>
      </svg>
      Hablar por WhatsApp
    </a>

    <!-- Footer -->
    <p class="note">© 2025 CRITERIA Consultoría Empresarial</p>

  </div>
</body>
</html>
